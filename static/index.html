<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Compass MVP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-blue-50 text-blue-900 selection:bg-indigo-500 selection:text-white min-h-screen">
    <!-- Modern Sleek Gradient Background -->
    <div class="fixed inset-0 -z-10 bg-blue-50">
        <div
            class="absolute inset-0 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-blue-100 via-blue-50 to-white">
        </div>
        <div class="absolute top-0 right-0 w-96 h-96 rounded-full bg-blue-300/20 blur-3xl pointer-events-none"></div>
        <div class="absolute bottom-0 left-0 w-96 h-96 rounded-full bg-indigo-300/20 blur-3xl pointer-events-none">
        </div>
    </div>
    <header class="bg-white/70 dark:bg-slate-800/70 backdrop-blur-md shadow-sm sticky top-0 z-10">
        <div class="container mx-auto p-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-indigo-500 dark:text-indigo-400">Career Compass</h1>
            <nav class="flex items-center">
                <div class="flex items-center gap-6 mr-6">
                    <a href="index.html"
                        class="text-indigo-600 dark:text-indigo-400 font-semibold hover:text-indigo-500 transition-colors">Home</a>
                    <a href="logs.html"
                        class="text-slate-600 dark:text-slate-300 font-medium hover:text-indigo-500 dark:hover:text-indigo-400 transition-colors">My
                        Logs</a>
                    <a href="generate-post.html"
                        class="text-slate-600 dark:text-slate-300 font-medium hover:text-indigo-500 dark:hover:text-indigo-400 transition-colors">Generate
                        Post</a>
                </div>
        </div>
        </nav>
        </div>
    </header>

    <div class="container mx-auto p-4">
        <div id="app" class="mt-4">
            <div class="flex flex-col items-center">
                <div class="w-full max-w-2xl">
                    <div
                        class="bg-white/60 dark:bg-gray-900/60 backdrop-blur-xl p-8 rounded-3xl shadow-xl border border-white/40 dark:border-gray-800/60">
                        <h2 class="text-2xl font-bold mb-6 text-slate-900 dark:text-white mt-2">Log Your Daily Activity
                        </h2>
                        <form id="log-form" class="space-y-4">
                            <input type="date" id="log-date"
                                class="w-full p-3 bg-white/50 dark:bg-gray-800/50 border border-slate-200 dark:border-gray-700/50 rounded-xl text-slate-800 dark:text-gray-100 focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all outline-none"
                                required>
                            <input type="text" id="log-title" placeholder="Activity Title"
                                class="w-full p-3 bg-white/50 dark:bg-gray-800/50 border border-slate-200 dark:border-gray-700/50 rounded-xl text-slate-800 dark:text-gray-100 focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all outline-none"
                                required>
                            <textarea id="log-description" placeholder="Activity Description (max 280 chars)"
                                class="w-full p-3 bg-white/50 dark:bg-gray-800/50 border border-slate-200 dark:border-gray-700/50 rounded-xl text-slate-800 dark:text-gray-100 focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all outline-none resize-none h-28"
                                required></textarea>
                            <div id="char-count"
                                class="text-right text-xs text-slate-500 dark:text-gray-400 font-medium"></div>
                            <input type="text" id="log-image-url" placeholder="Image URL (optional)"
                                class="w-full p-3 bg-white/50 dark:bg-gray-800/50 border border-slate-200 dark:border-gray-700/50 rounded-xl text-slate-800 dark:text-gray-100 focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all outline-none">
                            <img id="image-preview" src="#" alt="Image preview"
                                class="mt-2 max-w-full rounded-xl shadow-md border border-gray-200 dark:border-gray-700"
                                style="display: none;">
                            <input type="text" id="log-tags" placeholder="Tags (comma-separated)"
                                class="w-full p-3 bg-white/50 dark:bg-gray-800/50 border border-slate-200 dark:border-gray-700/50 rounded-xl text-slate-800 dark:text-gray-100 focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all outline-none">
                            <button type="submit"
                                class="w-full bg-indigo-600 text-white font-semibold py-3 px-4 rounded-xl hover:bg-indigo-700 dark:bg-indigo-500 dark:hover:bg-indigo-600 shadow-md hover:shadow-lg hover:shadow-indigo-500/20 transform hover:-translate-y-0.5 transition-all">Add
                                Log</button>
                        </form>
                    </div>

                    <!-- Live Community Feed Section -->
                    <div
                        class="bg-white/60 dark:bg-gray-900/60 backdrop-blur-xl p-8 rounded-3xl shadow-xl border border-white/40 dark:border-gray-800/60 mt-8 mb-8">
                        <div class="flex items-center mb-6">
                            <div
                                class="w-2.5 h-2.5 bg-emerald-500 rounded-full animate-pulse mr-3 shadow-[0_0_8px_rgba(16,185,129,0.8)]">
                            </div>
                            <h2 class="text-xl font-bold text-slate-900 dark:text-white tracking-tight">Live Community
                                Feed</h2>
                        </div>
                        <div id="community-feed"
                            class="space-y-4 max-h-96 overflow-y-auto pr-2 scrollbar-thin scrollbar-thumb-gray-300 dark:scrollbar-thumb-gray-700">
                            <!-- Real-time SSE updates will appear here -->
                            <p class="text-sm text-slate-500 dark:text-gray-400 italic text-center py-6">Waiting for new
                                activity...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-white dark:bg-slate-800 shadow-md mt-8">
        <div class="container mx-auto p-4 text-center text-slate-600 dark:text-slate-400">
            &copy; 2025 Career Compass. All rights reserved.
        </div>
    </footer>

    <script src="app.js"></script>
</body>

</html>
