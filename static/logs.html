<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Compass MVP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .custom-scrollbar::-webkit-scrollbar {
            height: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(99, 102, 241, 0.3);
            /* indigo-500 with opacity */
            border-radius: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(99, 102, 241, 0.6);
        }
    </style>
</head>

<body class="bg-blue-50 text-blue-900 selection:bg-indigo-500 selection:text-white min-h-screen">
    <!-- Modern Sleek Gradient Background -->
    <div class="fixed inset-0 -z-10 bg-blue-50">
        <div
            class="absolute inset-0 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-blue-100 via-blue-50 to-white">
        </div>
        <div class="absolute top-0 right-0 w-96 h-96 rounded-full bg-blue-300/20 blur-3xl pointer-events-none"></div>
        <div class="absolute bottom-0 left-0 w-96 h-96 rounded-full bg-indigo-300/20 blur-3xl pointer-events-none">
        </div>
    </div>
    <header class="bg-white/70 backdrop-blur-md shadow-sm sticky top-0 z-10">
        <div class="container mx-auto p-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-indigo-500">Career Compass</h1>
            <nav class="flex items-center">
                <div class="flex items-center gap-6 mr-6">
                    <a href="index.html"
                        class="text-slate-600 font-medium hover:text-indigo-500 transition-colors">Home</a>
                    <a href="logs.html"
                        class="text-indigo-600 font-semibold hover:text-indigo-500 transition-colors">My
                        Logs</a>
                    <a href="applications.html"
                        class="text-slate-600 font-medium hover:text-indigo-500 transition-colors">Job Tracker</a>
                    <a href="generate-post.html"
                        class="text-slate-600 font-medium hover:text-indigo-500 transition-colors">Generate
                        Post</a>
                </div>
        </div>
        </nav>
        </div>
    </header>

    <div class="container mx-auto p-4">
        <div id="app" class="mt-4">
            <div class="flex flex-col items-center">
                <div class="w-full max-w-5xl">
                    <div
                        class="mt-8 bg-white/30 backdrop-blur-md p-6 rounded-2xl shadow-lg border border-white/20 flex flex-col xl:flex-row xl:justify-between xl:items-center gap-4">
                        <div class="flex flex-col sm:flex-row gap-4 flex-grow">
                            <input type="text" id="search-bar" placeholder="Search logs..."
                                class="w-full p-3 bg-white/50 border border-slate-200 rounded-xl text-slate-800 focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all outline-none">
                            <input type="text" id="filter-by-tag" placeholder="Filter by tag..."
                                class="w-full p-3 bg-white/50 border border-slate-200 rounded-xl text-slate-800 focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all outline-none">
                        </div>
                        <div class="flex items-center gap-4">
                            <select id="sort-by"
                                class="p-3 bg-white/50 border border-slate-200 rounded-xl text-slate-800 focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all outline-none cursor-pointer">
                                <option value="date">Sort by Date</option>
                                <option value="title">Sort by Title</option>
                            </select>
                            <button id="clear-filters-btn"
                                class="bg-slate-200 text-slate-700 hover:bg-slate-300 px-4 py-3 rounded-xl transition-colors font-medium">Clear</button>
                        </div>
                        <div class="flex items-center gap-2 text-sm font-medium">
                            <label for="start-date" class="hidden sm:block">From</label>
                            <input type="date" id="start-date"
                                class="p-2.5 bg-white/50 border border-slate-200 rounded-lg text-slate-800 outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all cursor-pointer">
                            <label for="end-date" class="hidden sm:block">To</label>
                            <input type="date" id="end-date"
                                class="p-2.5 bg-white/50 border border-slate-200 rounded-lg text-slate-800 outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all cursor-pointer">
                        </div>
                    </div>

                    <div id="logs-container" class="mt-8">
                        <h2 class="text-2xl font-bold text-slate-900 tracking-tight mb-6">Your Logs
                            History</h2>
                        <div id="logs-list" class="mt-4 gap-6 sm:columns-2 xl:columns-3">
                            <!-- Logs will be rendered here -->
                        </div>
                        <div class="mt-8 flex justify-center gap-4">
                            <button id="prev-page-btn"
                                class="bg-white/50 border border-slate-200 text-slate-700 hover:bg-white font-medium py-2 px-6 rounded-xl transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                                disabled>Previous</button>
                            <button id="next-page-btn"
                                class="bg-white/50 border border-slate-200 text-slate-700 hover:bg-white font-medium py-2 px-6 rounded-xl transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                                disabled>Next</button>
                        </div>
                    </div>

                    <div id="heatmap-container" class="mt-12">
                        <h3 class="text-2xl font-bold text-slate-900 tracking-tight mb-6">Contribution
                            Graph</h3>
                        <div id="heatmap"
                            class="bg-white/30 backdrop-blur-md p-6 rounded-2xl shadow-lg border border-white/20 overflow-x-auto">
                            <!-- Heatmap will be rendered here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-white shadow-md mt-8">
        <div class="container mx-auto p-4 text-center text-slate-600">
            &copy; 2025 Career Compass. All rights reserved.
        </div>
    </footer>

    <script src="app.js"></script>
</body>

</html>
