<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Applications - Career Compass MVP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-blue-50 text-blue-900 selection:bg-indigo-500 selection:text-white min-h-screen">
    <!-- Background -->
    <div class="fixed inset-0 -z-10 bg-blue-50">
        <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-blue-100 via-blue-50 to-white"></div>
        <div class="absolute top-0 right-0 w-96 h-96 rounded-full bg-blue-300/20 blur-3xl pointer-events-none"></div>
        <div class="absolute bottom-0 left-0 w-96 h-96 rounded-full bg-indigo-300/20 blur-3xl pointer-events-none"></div>
    </div>

    <!-- Header -->
    <header class="bg-white/70 backdrop-blur-md shadow-sm sticky top-0 z-10">
        <div class="container mx-auto p-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-indigo-500">Career Compass</h1>
            <nav class="flex items-center">
                <div class="flex items-center gap-6 mr-6">
                    <a href="index.html" class="text-slate-600 font-medium hover:text-indigo-500 transition-colors">Home</a>
                    <a href="logs.html" class="text-slate-600 font-medium hover:text-indigo-500 transition-colors">My Logs</a>
                    <a href="applications.html" class="text-indigo-600 font-semibold hover:text-indigo-500 transition-colors">Job Tracker</a>
                    <a href="generate-post.html" class="text-slate-600 font-medium hover:text-indigo-500 transition-colors">Generate Post</a>
                </div>
            </nav>
        </div>
    </header>

    <div class="container mx-auto p-4 max-w-[1400px] mt-8">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-3xl font-bold text-slate-900 tracking-tight">Job Tracker</h2>
            <button id="open-modal-btn" class="bg-indigo-600 text-white font-semibold py-2.5 px-5 rounded-xl shadow-md hover:bg-indigo-700 hover:shadow-lg transition-all flex items-center">
                <i data-lucide="plus" class="w-5 h-5 mr-2"></i> Add Application
            </button>
        </div>

        <!-- Kanban Board -->
        <div class="flex gap-6 overflow-x-auto pb-8 items-start min-h-[60vh] custom-scrollbar">
            <!-- Applied Column -->
            <div class="kanban-column w-80 shrink-0 bg-white/40 backdrop-blur-md rounded-2xl p-4 shadow-sm border border-white/40 flex flex-col" data-status="Applied">
                <div class="flex justify-between items-center mb-4 px-1">
                    <h3 class="font-bold text-slate-800">✉️ Applied</h3>
                    <span class="bg-blue-100 text-blue-800 text-xs font-bold px-2 py-1 rounded-full col-count">0</span>
                </div>
                <div class="kanban-cards flex-1 space-y-4 min-h-[50px]" id="col-applied"></div>
            </div>

            <!-- Interviewing Column -->
            <div class="kanban-column w-80 shrink-0 bg-white/40 backdrop-blur-md rounded-2xl p-4 shadow-sm border border-white/40 flex flex-col" data-status="Interviewing">
                <div class="flex justify-between items-center mb-4 px-1">
                    <h3 class="font-bold text-slate-800">💬 Interviewing</h3>
                    <span class="bg-amber-100 text-amber-800 text-xs font-bold px-2 py-1 rounded-full col-count">0</span>
                </div>
                <div class="kanban-cards flex-1 space-y-4 min-h-[50px]" id="col-interviewing"></div>
            </div>

            <!-- Offer Column -->
            <div class="kanban-column w-80 shrink-0 bg-white/40 backdrop-blur-md rounded-2xl p-4 shadow-sm border border-white/40 flex flex-col" data-status="Offer">
                <div class="flex justify-between items-center mb-4 px-1">
                    <h3 class="font-bold text-slate-800">🎉 Offer</h3>
                    <span class="bg-emerald-100 text-emerald-800 text-xs font-bold px-2 py-1 rounded-full col-count">0</span>
                </div>
                <div class="kanban-cards flex-1 space-y-4 min-h-[50px]" id="col-offer"></div>
            </div>

            <!-- Rejected Column -->
            <div class="kanban-column w-80 shrink-0 bg-white/40 backdrop-blur-md rounded-2xl p-4 shadow-sm border border-white/40 flex flex-col" data-status="Rejected">
                <div class="flex justify-between items-center mb-4 px-1">
                    <h3 class="font-bold text-slate-800">❌ Rejected</h3>
                    <span class="bg-rose-100 text-rose-800 text-xs font-bold px-2 py-1 rounded-full col-count">0</span>
                </div>
                <div class="kanban-cards flex-1 space-y-4 min-h-[50px]" id="col-rejected"></div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div id="application-modal" class="fixed inset-0 z-50 bg-slate-900/40 backdrop-blur-sm hidden items-center justify-center">
        <div class="bg-white/90 backdrop-blur-xl p-8 rounded-2xl shadow-2xl border border-white/20 w-full max-w-md mx-4 transform scale-95 opacity-0 transition-all duration-300" id="modal-content">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold text-slate-900" id="modal-title">New Application</h3>
                <button id="close-modal-btn" class="text-slate-400 hover:text-slate-600 transition-colors">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            <form id="application-form" class="space-y-4">
                <input type="hidden" id="app-id">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Company Name</label>
                    <input type="text" id="app-company" class="w-full p-2.5 bg-white/50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Role / Job Title</label>
                    <input type="text" id="app-role" class="w-full p-2.5 bg-white/50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none" required>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Status</label>
                        <select id="app-status" class="w-full p-2.5 bg-white/50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none cursor-pointer">
                            <option value="Applied">Applied</option>
                            <option value="Interviewing">Interviewing</option>
                            <option value="Offer">Offer</option>
                            <option value="Rejected">Rejected</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Date Applied</label>
                        <input type="date" id="app-date" class="w-full p-2.5 bg-white/50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Notes</label>
                    <textarea id="app-notes" rows="3" class="w-full p-2.5 bg-white/50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none resize-none"></textarea>
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white font-semibold py-3 rounded-xl shadow-lg hover:shadow-indigo-500/30 hover:-translate-y-0.5 transition-all">Save Application</button>
            </form>
        </div>
    </div>

    <script src="applications.js" type="module"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
